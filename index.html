<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 汉字小侦探</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'ZCOOL KuaiLe', 'Comic Sans MS', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fff5f5 0%, #f0f9ff 50%, #f0fdf4 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='10' cy='10' r='2' fill='%23ff6b9d' opacity='0.15'/%3E%3Ccircle cx='50' cy='30' r='1.5' fill='%234ade80' opacity='0.15'/%3E%3Ccircle cx='30' cy='50' r='2' fill='%23fbbf24' opacity='0.15'/%3E%3Ccircle cx='50' cy='50' r='1.5' fill='%2360a5fa' opacity='0.15'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            animation: floatBg 20s linear infinite;
        }

        @keyframes floatBg {
            0% { transform: translateY(0); }
            100% { transform: translateY(-60px); }
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .title {
            text-align: center;
            font-size: 2.8em;
            color: #ff6b9d;
            text-shadow: 
                3px 3px 0 #fff,
                -1px -1px 0 #fff,
                1px -1px 0 #fff,
                -1px 1px 0 #fff,
                4px 4px 0 #fbbf24;
            margin-bottom: 20px;
            animation: titleBounce 1s ease-in-out infinite;
            position: relative;
        }

        .title::before, .title::after {
            content: '⭐';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.6em;
            animation: starSpin 2s linear infinite;
        }

        .title::before {
            left: -40px;
        }

        .title::after {
            right: -40px;
        }

        @keyframes titleBounce {
            0%, 100% { transform: translateY(0) rotate(-1deg); }
            50% { transform: translateY(-8px) rotate(1deg); }
        }

        @keyframes starSpin {
            0% { transform: translateY(-50%) rotate(0deg) scale(1); }
            50% { transform: translateY(-50%) rotate(180deg) scale(1.2); }
            100% { transform: translateY(-50%) rotate(360deg) scale(1); }
        }

        .instructions {
            background: linear-gradient(145deg, #fffbeb, #fef3c7);
            border-radius: 20px;
            padding: 15px 25px;
            margin-bottom: 20px;
            border: 3px dashed #fbbf24;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.2);
            position: relative;
            animation: fadeInDown 0.5s ease-out;
        }

        .instructions::before {
            content: '💡';
            position: absolute;
            top: -15px;
            left: 20px;
            font-size: 1.5em;
            animation: lightBulb 1.5s ease-in-out infinite;
        }

        @keyframes lightBulb {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .instructions p {
            color: #92400e;
            font-size: 1.1em;
            line-height: 1.6;
        }

        .input-section {
            background: linear-gradient(145deg, #fff, #fdf2f8);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 
                0 10px 30px rgba(255, 107, 157, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            border: 4px solid transparent;
            border-image: linear-gradient(45deg, #ff6b9d, #fbbf24, #4ade80, #60a5fa, #ff6b9d) 1;
            position: relative;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .input-section h3 {
            color: #ff6b9d;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .input-title {
            text-align: center;
            font-size: 1.6em;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .input-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .input-row input {
            flex: 1;
            min-width: 200px;
            padding: 14px 22px;
            border: 3px solid #ff6b9d;
            border-radius: 25px;
            font-size: 1.1em;
            outline: none;
            transition: all 0.3s;
            background: #fff;
        }

        .input-row input:focus {
            border-color: #fbbf24;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
            transform: scale(1.02);
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-add {
            background: linear-gradient(145deg, #60a5fa, #3b82f6);
            color: white;
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-add:hover {
            transform: scale(1.08) rotate(-2deg);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
        }

        .btn-generate {
            background: linear-gradient(145deg, #4ade80, #22c55e);
            color: white;
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
        }

        .btn-generate:hover {
            transform: scale(1.08) rotate(2deg);
            box-shadow: 0 8px 25px rgba(34, 197, 94, 0.5);
        }

        .btn-clear {
            background: linear-gradient(145deg, #fb923c, #f97316);
            color: white;
            box-shadow: 0 6px 20px rgba(249, 115, 22, 0.4);
        }

        .btn-clear:hover {
            transform: scale(1.08) rotate(-2deg);
            box-shadow: 0 8px 25px rgba(249, 115, 22, 0.5);
        }

        .word-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .word-tag {
            background: linear-gradient(145deg, #fef3c7, #fde68a);
            padding: 8px 18px;
            border-radius: 20px;
            font-family: '方正楷体', 'KaiTi', '楷体', 'Microsoft YaHei', sans-serif;
            font-size: 1em;
            color: #92400e;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(251, 191, 36, 0.3);
            border: 2px solid #fbbf24;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .word-tag .remove {
            cursor: pointer;
            color: #ef4444;
            font-weight: bold;
            font-size: 1.2em;
            transition: transform 0.2s;
        }

        .word-tag .remove:hover {
            transform: scale(1.3) rotate(90deg);
        }

        .game-area {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 20px;
            align-items: stretch;
        }

        .grid-container {
            background: linear-gradient(145deg, #fff, #fefce8);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 
                0 15px 40px rgba(255, 107, 157, 0.2),
                inset 0 2px 0 rgba(255, 255, 255, 0.8);
            border: 5px solid #ff6b9d;
            grid-row: 1;
            grid-column: 1;
            position: relative;
        }

        .grid-container::before {
            content: '🔍';
            position: absolute;
            top: -20px;
            left: 20px;
            font-size: 2em;
            animation: searchBounce 2s ease-in-out infinite;
        }

        @keyframes searchBounce {
            0%, 100% { transform: translateY(0) rotate(-10deg); }
            50% { transform: translateY(-5px) rotate(10deg); }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            position: relative;
        }

        .cell {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: '方正楷体', 'KaiTi', '楷体', 'Microsoft YaHei', sans-serif;
            font-size: 1.4em;
            font-weight: bold;
            background: linear-gradient(145deg, #fff, #fef9c3);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 3px solid #fde68a;
            user-select: none;
            position: relative;
            z-index: 1;
        }

        .cell:hover {
            transform: scale(1.15) rotate(3deg);
            background: linear-gradient(145deg, #fef3c7, #fde047);
            border-color: #fbbf24;
            box-shadow: 0 5px 15px rgba(251, 191, 36, 0.4);
        }

        .cell.selected {
            background: linear-gradient(145deg, #a5f3fc, #22d3ee);
            border-color: #0891b2;
            transform: scale(1.15);
            box-shadow: 0 5px 20px rgba(34, 211, 238, 0.5);
            animation: selectedPulse 0.5s ease-in-out;
        }

        @keyframes selectedPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1.15); }
        }

        .cell.found {
            background: linear-gradient(145deg, #bbf7d0, #4ade80);
            border-color: #16a34a;
            color: #166534;
            animation: foundCelebrate 0.6s ease-out;
        }

        @keyframes foundCelebrate {
            0% { transform: scale(1); }
            25% { transform: scale(1.3) rotate(-5deg); }
            50% { transform: scale(1.2) rotate(5deg); }
            75% { transform: scale(1.1) rotate(-3deg); }
            100% { transform: scale(1); }
        }

        .canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        #lineCanvas {
            pointer-events: none;
        }

        .word-list-container {
            background: linear-gradient(145deg, #fff, #fdf2f8);
            border-radius: 30px;
            padding: 20px;
            min-width: 320px;
            box-shadow: 
                0 15px 40px rgba(255, 107, 157, 0.2),
                inset 0 2px 0 rgba(255, 255, 255, 0.8);
            border: 5px solid #f472b6;
            grid-row: 1;
            grid-column: 2;
            justify-self: end;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .word-list-container::before {
            content: '🎯';
            position: absolute;
            top: -20px;
            right: 20px;
            font-size: 2em;
            animation: targetPulse 1.5s ease-in-out infinite;
        }

        @keyframes targetPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .word-list-container h3 {
            color: #ec4899;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1.5em;
            flex-shrink: 0;
            text-shadow: 2px 2px 0 #fff;
        }

        .word-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(6, auto);
            gap: 10px;
            flex: 1;
            align-content: start;
        }

        .word-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: linear-gradient(145deg, #fff, #fef3c7);
            border-radius: 15px;
            border: 3px solid #fde68a;
            transition: all 0.3s;
            animation: slideInRight 0.3s ease-out;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .word-item:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(251, 191, 36, 0.3);
        }

        .word-item.found {
            background: linear-gradient(145deg, #dcfce7, #86efac);
            border-color: #4ade80;
            animation: foundItem 0.5s ease-out;
        }

        @keyframes foundItem {
            0% { transform: scale(1); }
            50% { transform: scale(1.1) rotate(3deg); }
            100% { transform: scale(1); }
        }

        .word-item.found .word-text {
            color: #166534;
        }

        .checkbox {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 3px solid #fbbf24;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1em;
            color: transparent;
            transition: all 0.3s;
            background: #fff;
        }

        .word-item.found .checkbox {
            background: linear-gradient(145deg, #4ade80, #22c55e);
            border-color: #16a34a;
            color: white;
            animation: checkPop 0.4s ease-out;
        }

        @keyframes checkPop {
            0% { transform: scale(0); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .word-text {
            font-family: '方正楷体', 'KaiTi', '楷体', 'Microsoft YaHei', sans-serif;
            font-size: 1.15em;
            color: #92400e;
            font-weight: bold;
        }

        .word-icon {
            font-size: 1.3em;
            margin-left: 3px;
            margin-right: 3px;
        }

        .score-display {
            text-align: center;
            margin-top: 15px;
            padding: 12px;
            background: linear-gradient(145deg, #fef3c7, #fde047);
            border-radius: 20px;
            border: 3px solid #fbbf24;
            flex-shrink: 0;
        }

        .score-display span {
            font-size: 1.3em;
            color: #92400e;
            font-weight: bold;
        }

        .celebration {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, #fef3c7, #fde047);
            padding: 50px 70px;
            border-radius: 35px;
            border: 6px solid #fbbf24;
            box-shadow: 0 20px 60px rgba(251, 191, 36, 0.5);
            z-index: 1000;
            text-align: center;
            animation: celebrateIn 0.8s ease-out;
            display: none;
        }

        @keyframes celebrateIn {
            0% { 
                transform: translate(-50%, -50%) scale(0) rotate(-180deg);
                opacity: 0;
            }
            50% { 
                transform: translate(-50%, -50%) scale(1.1) rotate(10deg);
            }
            100% { 
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .celebration h2 {
            color: #ff6b9d;
            font-size: 2.5em;
            margin-bottom: 15px;
            text-shadow: 3px 3px 0 #fff;
            animation: celebrateText 0.5s ease-in-out infinite alternate;
        }

        @keyframes celebrateText {
            from { transform: scale(1) rotate(-2deg); }
            to { transform: scale(1.1) rotate(2deg); }
        }

        .celebration p {
            color: #92400e;
            font-size: 1.5em;
        }

        .celebration::before {
            content: '🎉';
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3em;
            animation: bounce 0.5s ease-in-out infinite;
        }

        .celebration::after {
            content: '🎊';
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5em;
            animation: bounce 0.5s ease-in-out infinite reverse;
        }

        @media (max-width: 768px) {
            .cell {
                width: 32px;
                height: 32px;
                font-size: 1em;
            }
            
            .title {
                font-size: 1.8em;
            }
            
            .title::before, .title::after {
                display: none;
            }
            
            .game-area {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            
            .word-list-container {
                justify-self: center;
                align-items: stretch;
                min-width: 280px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🎮 汉字小侦探</h1>
        
        <div class="instructions">
            <p>玩法说明：在下方输入要找的词语，点击"生成游戏"后，在方格找到这些词语。</p>
        </div>

        <div class="input-section">
            <h3 class="input-title">✏️ 输入词语 📝</h3>
            <div class="input-row">
                <input type="text" id="wordInput" placeholder="输入词语，用空格或逗号分隔（如：春天 夏天,秋天）">
                <button class="btn btn-add" onclick="addWord()">添加词语</button>
                <button class="btn btn-generate" onclick="generateGame()">生成游戏</button>
                <button class="btn btn-clear" onclick="clearAll()">清空</button>
            </div>
            <div class="word-tags" id="wordTags"></div>
        </div>

        <div class="game-area">
            <div class="grid-container">
                <div class="grid" id="grid">
                    <canvas id="lineCanvas" class="canvas-container"></canvas>
                </div>
            </div>
            
            <div class="word-list-container">
                <h3>词语小任务</h3>
                <div class="word-list" id="wordList"></div>
                <div class="score-display">
                    <span>已找到：<span id="foundCount">0</span> / <span id="totalCount">0</span></span>
                </div>
            </div>
        </div>
    </div>

    <div class="celebration" id="celebration">
        <h2>太棒了！</h2>
        <p>你找到了所有词语！</p>
    </div>

    <script>
        const GRID_SIZE = 10;
        const DIRECTIONS = [
            { dx: 1, dy: 0, name: 'horizontal' },
            { dx: 0, dy: 1, name: 'vertical' },
            { dx: 1, dy: 1, name: 'diagonal-down' },
            { dx: 1, dy: -1, name: 'diagonal-up' },
            { dx: -1, dy: 0, name: 'horizontal-reverse' },
            { dx: 0, dy: -1, name: 'vertical-reverse' },
            { dx: -1, dy: -1, name: 'diagonal-up-reverse' },
            { dx: -1, dy: 1, name: 'diagonal-down-reverse' }
        ];

        let words = [];
        let grid = [];
        let wordPositions = [];
        let selectedCells = [];
        let foundWords = [];
        let isSelecting = false;
        let startCell = null;

        const randomChars = '天地人和风云雨雪山水花草树木鸟鱼虫春夏秋冬东西南北日月星辰江河湖海金银铜铁红黄蓝绿黑白紫橙粉灰明亮暗暖冷热大小高低长短新旧好坏美丑快慢远近深浅轻重厚薄宽窄粗细圆方直弯斜正反前后左右上下内外中旁';

        function initGrid() {
            grid = [];
            for (let i = 0; i < GRID_SIZE; i++) {
                grid[i] = [];
                for (let j = 0; j < GRID_SIZE; j++) {
                    grid[i][j] = '';
                }
            }
        }

        function canPlaceWord(word, startX, startY, direction) {
            for (let i = 0; i < word.length; i++) {
                const x = startX + direction.dx * i;
                const y = startY + direction.dy * i;
                
                if (x < 0 || x >= GRID_SIZE || y < 0 || y >= GRID_SIZE) {
                    return false;
                }
                
                if (grid[y][x] !== '' && grid[y][x] !== word[i]) {
                    return false;
                }
            }
            return true;
        }

        function placeWord(word) {
            const shuffledDirections = [...DIRECTIONS].sort(() => Math.random() - 0.5);
            
            for (let attempt = 0; attempt < 100; attempt++) {
                const direction = shuffledDirections[attempt % shuffledDirections.length];
                const startX = Math.floor(Math.random() * GRID_SIZE);
                const startY = Math.floor(Math.random() * GRID_SIZE);
                
                if (canPlaceWord(word, startX, startY, direction)) {
                    const positions = [];
                    for (let i = 0; i < word.length; i++) {
                        const x = startX + direction.dx * i;
                        const y = startY + direction.dy * i;
                        grid[y][x] = word[i];
                        positions.push({ x, y });
                    }
                    return positions;
                }
            }
            return null;
        }

        function fillEmptyCells() {
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    if (grid[i][j] === '') {
                        grid[i][j] = randomChars[Math.floor(Math.random() * randomChars.length)];
                    }
                }
            }
        }

        function renderGrid() {
            const gridElement = document.getElementById('grid');
            gridElement.innerHTML = '<canvas id="lineCanvas" class="canvas-container"></canvas>';
            
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.textContent = grid[i][j];
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    cell.addEventListener('click', () => handleCellClick(i, j));
                    cell.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        handleCellClick(i, j);
                    });
                    gridElement.appendChild(cell);
                }
            }
            
            resizeCanvas();
        }

        function resizeCanvas() {
            const gridElement = document.getElementById('grid');
            const canvas = document.getElementById('lineCanvas');
            canvas.width = gridElement.offsetWidth;
            canvas.height = gridElement.offsetHeight;
        }

        function handleCellClick(row, col) {
            const cell = document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);
            
            if (cell.classList.contains('found')) {
                return;
            }

            if (selectedCells.length === 0) {
                selectedCells = [{ row, col }];
                cell.classList.add('selected');
                startCell = { row, col };
                isSelecting = true;
            } else {
                const lastCell = selectedCells[selectedCells.length - 1];
                
                if (lastCell.row === row && lastCell.col === col) {
                    cell.classList.remove('selected');
                    selectedCells.pop();
                    if (selectedCells.length === 0) {
                        isSelecting = false;
                        startCell = null;
                    }
                } else if (isValidNextCell(row, col)) {
                    selectedCells.push({ row, col });
                    cell.classList.add('selected');
                    
                    checkSelectedWord();
                } else {
                    clearSelection();
                    selectedCells = [{ row, col }];
                    cell.classList.add('selected');
                    startCell = { row, col };
                    isSelecting = true;
                }
            }
            
            drawLines();
        }

        function isValidNextCell(row, col) {
            if (selectedCells.length === 0) return true;
            
            const lastCell = selectedCells[selectedCells.length - 1];
            const dx = col - lastCell.col;
            const dy = row - lastCell.row;
            
            if (Math.abs(dx) > 1 || Math.abs(dy) > 1) return false;
            if (dx === 0 && dy === 0) return false;
            
            if (selectedCells.length === 1) return true;
            
            const prevCell = selectedCells[selectedCells.length - 2];
            const prevDx = lastCell.col - prevCell.col;
            const prevDy = lastCell.row - prevCell.row;
            
            return dx === prevDx && dy === prevDy;
        }

        function checkSelectedWord() {
            const selectedWord = selectedCells.map(cell => grid[cell.row][cell.col]).join('');
            
            for (let i = 0; i < words.length; i++) {
                if (!foundWords.includes(words[i]) && 
                    (selectedWord === words[i] || selectedWord === words[i].split('').reverse().join(''))) {
                    foundWords.push(words[i]);
                    markCellsAsFound();
                    updateWordList();
                    checkWin();
                    clearSelection();
                    return;
                }
            }
        }

        function markCellsAsFound() {
            selectedCells.forEach(cell => {
                const cellElement = document.querySelector(`.cell[data-row="${cell.row}"][data-col="${cell.col}"]`);
                cellElement.classList.remove('selected');
                cellElement.classList.add('found');
            });
        }

        function clearSelection() {
            document.querySelectorAll('.cell.selected').forEach(cell => {
                cell.classList.remove('selected');
            });
            selectedCells = [];
            isSelecting = false;
            startCell = null;
            drawLines();
        }

        function drawLines() {
            const canvas = document.getElementById('lineCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (selectedCells.length < 2) return;
            
            ctx.beginPath();
            ctx.strokeStyle = '#ff6b9d';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            selectedCells.forEach((cell, index) => {
                const cellElement = document.querySelector(`.cell[data-row="${cell.row}"][data-col="${cell.col}"]`);
                const rect = cellElement.getBoundingClientRect();
                const gridRect = document.getElementById('grid').getBoundingClientRect();
                
                const x = rect.left - gridRect.left + rect.width / 2;
                const y = rect.top - gridRect.top + rect.height / 2;
                
                if (index === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });
            
            ctx.stroke();
        }

        function updateWordList() {
            const wordListElement = document.getElementById('wordList');
            wordListElement.innerHTML = '';
            
            words.forEach(word => {
                const item = document.createElement('div');
                item.className = 'word-item' + (foundWords.includes(word) ? ' found' : '');
                const icon = getWordIcon(word);
                
                item.innerHTML = `
                    <div class="checkbox">${foundWords.includes(word) ? '✓' : ''}</div>
                    <span class="word-icon">${icon}</span>
                    <span class="word-text">${word}</span>
                `;
                
                wordListElement.appendChild(item);
            });
            
            document.getElementById('foundCount').textContent = foundWords.length;
            document.getElementById('totalCount').textContent = words.length;
        }

        function checkWin() {
            if (foundWords.length === words.length && words.length > 0) {
                setTimeout(() => {
                    document.getElementById('celebration').style.display = 'block';
                    setTimeout(() => {
                        document.getElementById('celebration').style.display = 'none';
                    }, 3000);
                }, 500);
            }
        }

        function addWord() {
            const input = document.getElementById('wordInput');
            const inputValue = input.value.trim();
            
            if (!inputValue) return;
            
            const newWords = inputValue.split(/[\s,，]+/).filter(w => w.trim());
            
            newWords.forEach(word => {
                const trimmedWord = word.trim();
                if (trimmedWord && !words.includes(trimmedWord) && trimmedWord.length >= 2 && trimmedWord.length <= 10) {
                    words.push(trimmedWord);
                }
            });
            
            renderWordTags();
            input.value = '';
            input.focus();
        }

        function removeWord(word) {
            words = words.filter(w => w !== word);
            renderWordTags();
        }

        function renderWordTags() {
            const tagsContainer = document.getElementById('wordTags');
            tagsContainer.innerHTML = '';
            
            words.forEach(word => {
                const tag = document.createElement('div');
                tag.className = 'word-tag';
                tag.innerHTML = `
                    <span>${word}</span>
                    <span class="remove" onclick="removeWord('${word}')">×</span>
                `;
                tagsContainer.appendChild(tag);
            });
        }

        function generateGame() {
            if (words.length === 0) {
                alert('请先添加一些词语！');
                return;
            }
            
            initGrid();
            wordPositions = [];
            foundWords = [];
            
            const sortedWords = [...words].sort((a, b) => b.length - a.length);
            
            for (const word of sortedWords) {
                const positions = placeWord(word);
                if (positions) {
                    wordPositions.push({ word, positions });
                } else {
                    alert(`无法放置词语"${word}"，请尝试减少词语数量或使用更短的词语。`);
                    return;
                }
            }
            
            fillEmptyCells();
            renderGrid();
            updateWordList();
        }

        function clearAll() {
            words = [];
            foundWords = [];
            selectedCells = [];
            wordPositions = [];
            initGrid();
            renderGrid();
            renderWordTags();
            updateWordList();
            
            const canvas = document.getElementById('lineCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        document.getElementById('wordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addWord();
            }
        });

        window.addEventListener('resize', () => {
            resizeCanvas();
            drawLines();
        });

        initGrid();
        renderGrid();
        updateWordList();
